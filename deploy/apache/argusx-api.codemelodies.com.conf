# /etc/apache2/sites-available/argusx-api.codemelodies.com.conf
# FastAPI orchestrator — systemd uvicorn on 127.0.0.1:8025
#
# sudo a2enmod proxy proxy_http proxy_wstunnel rewrite headers ssl
# sudo a2ensite argusx-api.codemelodies.com.conf
# sudo apache2ctl configtest && sudo systemctl reload apache2

# --- HTTP → HTTPS redirect ---
<VirtualHost *:80>
    ServerName argusx-api.codemelodies.com

    RewriteEngine On
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L]

    ErrorLog ${APACHE_LOG_DIR}/argusx-api-error.log
    CustomLog ${APACHE_LOG_DIR}/argusx-api-access.log combined
</VirtualHost>

# --- HTTPS → uvicorn (REST + WebSocket /ws/pulse) ---
<VirtualHost *:443>
    ServerName argusx-api.codemelodies.com

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/argusx.codemelodies.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/argusx.codemelodies.com/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf

    ProxyPreserveHost On
    ProxyRequests Off

    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteRule /(.*) ws://127.0.0.1:8025/$1 [P,L]
    RewriteCond %{HTTP:Upgrade} !=websocket [NC]
    RewriteRule /(.*) http://127.0.0.1:8025/$1 [P,L]

    ProxyPassReverse / http://127.0.0.1:8025/

    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"

    ErrorLog ${APACHE_LOG_DIR}/argusx-api-ssl-error.log
    CustomLog ${APACHE_LOG_DIR}/argusx-api-ssl-access.log combined
</VirtualHost>
