# /etc/apache2/sites-available/argusx.codemelodies.com.conf
# Next.js admin portal — PM2 Node (dynamic port in argusx-web-proxy.conf)
#
# sudo a2enmod proxy proxy_http headers ssl
# sudo a2ensite argusx.codemelodies.com.conf
# sudo apache2ctl configtest && sudo systemctl reload apache2

# --- HTTP → HTTPS redirect ---
<VirtualHost *:80>
    ServerName argusx.codemelodies.com

    RewriteEngine On
    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L]

    ErrorLog ${APACHE_LOG_DIR}/argusx-web-error.log
    CustomLog ${APACHE_LOG_DIR}/argusx-web-access.log combined
</VirtualHost>

# --- HTTPS → PM2 Next.js ---
<VirtualHost *:443>
    ServerName argusx.codemelodies.com

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/argusx.codemelodies.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/argusx.codemelodies.com/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf

    ProxyPreserveHost On
    ProxyRequests Off

    IncludeOptional /var/www/html/argusx-deploy/apache/argusx-web-proxy.conf

    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"

    ErrorLog ${APACHE_LOG_DIR}/argusx-web-ssl-error.log
    CustomLog ${APACHE_LOG_DIR}/argusx-web-ssl-access.log combined
</VirtualHost>
